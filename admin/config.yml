backend:
  name: github
  repo: DUHOCHNATBANWAKABA/wakaba
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Trang"
    files:
      - file: "index.html"
        label: "Trang chủ"
        name: "home"
        fields:
          - {label: "Tiêu đề", name: "title", widget: "string"}
          - {label: "Nội dung", name: "body", widget: "markdown"}
      - file: "introl.html"
        label: "Giới thiệu"
        name: "intro"
        fields:
          - {label: "Tiêu đề", name: "title", widget: "string"}
          - {label: "Nội dung", name: "body", widget: "markdown"}
